name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-flight deployment; let it finish (GitHub Pages guidance).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install, build, upload
        uses: withastro/action@v6
        # with:
        #   path: .            # repo root (default)
        #   node-version: 24

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Whichever attempt succeeds provides the page URL.
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      # GitHub Pages intermittently rejects deployments with
      # "Deployment failed, try again later." Retry up to three times with
      # backoff so a transient blip doesn't fail the whole publish.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
      - name: Wait before final attempt
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 75
      - name: Deploy to GitHub Pages (final attempt)
        id: deployment
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v5
